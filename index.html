<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>RG Menu</title> 
    <link rel="icon" type="image/png" href="imagenes/icon.png"> 
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <header> 
        <div class="header-logos">
            <img src="logo RG_REST.png" alt="Logo RG" class="header-logo">
            <span id="header-menu-title"></span>
            <img src="negro.png" alt="Logo Negro" class="header-logo">
        </div>
        
        <div id="language-selector">
            <button id="btn-ES" onclick="changeLanguage('ES')" class="active">Español</button>
            <button id="btn-EN" onclick="changeLanguage('EN')">English</button>
            <button id="btn-DE" onclick="changeLanguage('DE')">Deutsch</button>
            <button id="btn-FR" onclick="changeLanguage('FR')">Français</button>
            <button id="btn-IT" onclick="changeLanguage('IT')">Italiano</button>
            <select id="more-langs" onchange="changeLanguage(this.value)">
                <option value="">🌐 Más...</option>
            </select>
        </div>
        <div class="category-wrapper"> 
            <nav id="category-selector"></nav> 
        </div> 
    </header>

    <main id="menu-container"> 
        <div id="print-action-container" style="display: none; text-align: right; margin-bottom: 15px;">
            <button id="btn-print-a4" onclick="window.print()" class="print-btn">🖨️ Imprimir Hoja A4</button>
        </div>

        <h2 id="current-category-name"></h2> 
        
        <div id="a4-print-template" class="a4-page-setup" style="display: none;">
            <div class="a4-header">
                <div class="a4-branding-left">
                    <h1 class="title-chef-es">SUGERENCIAS DEL CHEF</h1>
                    <h2 class="title-chef-en">CHEF'S SUGGESTIONS</h2>
                </div>
                <div class="a4-branding-right">
                    <img src="logo RG_REST.png" alt="Logo RG REST" class="a4-main-logo">
                </div>
            </div>
            <hr class="a4-divider-top">
            
            <div id="a4-dynamic-sections"></div>
            
            <div class="a4-footer">
                <div class="a4-footer-info">
                    <p class="allergy-warning-es">⚠️ Si usted tiene algún tipo de alergia alimentaria, por favor comuníquelo a nuestro personal.</p>
                    <p class="allergy-warning-en">If you have any food allergies, please inform our staff.</p>
                </div>
                <div class="a4-footer-qr">
                    <img src="qr-code.png" alt="QR Code" class="a4-qr-img">
                </div>
            </div>
        </div>

        <div id="items-list">
            <div class="item-row skeleton-row">
                <div class="item-content">
                    <span class="skeleton-text line-70"></span>
                    <span class="skeleton-text line-40"></span>
                </div>
                <div class="price-box">
                    <span class="skeleton-text line-20"></span>
                </div>
            </div>
            <div class="item-row skeleton-row">
                <div class="item-content">
                    <span class="skeleton-text line-60"></span>
                    <span class="skeleton-text line-30"></span>
                </div>
                <div class="price-box">
                    <span class="skeleton-text line-20"></span>
                </div>
            </div>
            <div class="item-row skeleton-row">
                <div class="item-content">
                    <span class="skeleton-text line-50"></span>
                    <span class="skeleton-text line-40"></span>
                </div>
                <div class="price-box">
                    <span class="skeleton-text line-20"></span>
                </div>
            </div>
        </div> 
    </main>

    <div id="photo-modal" onclick="closeModal()"> 
        <span class="close-modal" onclick="closeModal()">&times;</span>  
        <button id="prev-btn" class="nav-btn" onclick="changePhoto(-1); event.stopPropagation();">❮</button>  
        <img id="modal-img" src="" alt="Vista previa" onclick="event.stopPropagation();">  
        <button id="next-btn" class="nav-btn" onclick="changePhoto(1); event.stopPropagation();">❯</button> 
    </div>

    <script src="script.js"></script>
</body>
</html>
